<style>
:root{
  --navy:#0C1860;--navy-2:#152A82;--blue:#0E7EC4;--blue-deep:#0A5E96;--blue-bright:#27A9E5;
  --t1:#101A3A;--t2:#465A73;--border:#D7E6F2;--radius:18px;--maxw:1180px;
  --font-head:'Sora',sans-serif;--font-body:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  min-height:100vh;font-family:var(--font-body);color:#fff;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  background:
    radial-gradient(1100px 700px at 18% -10%,rgba(39,169,229,.22),transparent 60%),
    radial-gradient(900px 600px at 100% 110%,rgba(14,126,196,.28),transparent 60%),
    linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 50%,#0A123F 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:64px 24px;text-align:center;
}
.wrap{max-width:var(--maxw);width:100%}
.logo{height:64px;width:auto;margin:0 auto 40px;display:block}
h1{
  font-family:var(--font-head);font-weight:800;letter-spacing:-.02em;
  font-size:clamp(1.6rem,4vw,2.5rem);line-height:1.25;color:#fff;
  max-width:820px;margin:0 auto 52px;
}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;max-width:900px;margin:0 auto}
.card{
  background:#fff;border-radius:var(--radius);padding:32px 30px;text-align:left;
  box-shadow:0 20px 50px rgba(6,12,42,.35);transition:transform .25s ease,box-shadow .25s ease;
}
.card:hover{transform:translateY(-6px);box-shadow:0 26px 60px rgba(6,12,42,.45)}
.card .kicker{
  display:inline-block;font-family:var(--font-head);font-size:.74rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--blue-deep);margin-bottom:12px;
}
.card h2{font-family:var(--font-head);font-size:1.5rem;font-weight:700;color:var(--navy);margin-bottom:12px}
.card p{font-size:.98rem;color:var(--t2);margin-bottom:22px;min-height:3.2em}
.card a{
  display:inline-flex;align-items:center;gap:8px;font-family:var(--font-head);font-weight:700;
  color:var(--blue);text-decoration:none;font-size:1rem;transition:.2s;
}
.card a svg{transition:transform .2s}
.card:hover a{color:var(--blue-deep)}
.card:hover a svg{transform:translateX(4px)}

.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

@media(max-width:640px){
  body{padding:48px 20px}
  .logo{height:52px;margin-bottom:28px}
  h1{margin-bottom:36px}
  .cards{grid-template-columns:1fr;gap:18px}
  .card{padding:26px 24px}
}
@media(min-width:1600px){
  .wrap{max-width:1320px}
  h1{font-size:2.7rem}
}
</style>

<script>
// favicon conforme o tema do navegador
(function(){
  var mq=window.matchMedia('(prefers-color-scheme: dark)');
  function setFavicon(){
    var href='assets/favicon-'+(mq.matches?'light':'dark')+'.svg';
    var link=document.getElementById('faviTheme');
    if(!link){link=document.createElement('link');link.id='faviTheme';link.rel='icon';link.type='image/svg+xml';document.head.appendChild(link);}
    link.href=href;
  }
  setFavicon();
  mq.addEventListener?mq.addEventListener('change',setFavicon):mq.addListener(setFavicon);
})();

// reveal / fade-in (cards entram em cascata)
const io=new IntersectionObserver((es)=>{es.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('in'),i*90);io.unobserve(e.target)}})},{threshold:.15});
document.querySelectorAll('.card.reveal').forEach(el=>io.observe(el));
</script>
